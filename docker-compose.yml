version: '3.8'

services:
  backend:
    build: ./backend
    container_name: music-bot-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000

  frontend:
    build: ./frontend
    container_name: music-bot-frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

